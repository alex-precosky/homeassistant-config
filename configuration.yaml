---
# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  external_url: "https://chez-salex-ha.duckdns.org/"

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.19.0.0/16
  ip_ban_enabled: true
  login_attempts_threshold: 5

lovelace:
  dashboards:
    front-door:
      mode: yaml
      filename: dashboards/front-door.yaml
      title: Front door
      icon: mdi:home-outline
      show_in_sidebar: true

    alex-office:
      mode: yaml
      filename: dashboards/alex-office.yaml
      title: Hubs Office
      icon: mdi:home-outline
      show_in_sidebar: true

    mini-splits:
      mode: yaml
      filename: dashboards/mini-splits.yaml
      title: Mini-Splits
      icon: mdi:home-outline
      show_in_sidebar: true

    my-robots:
      mode: yaml
      filename: dashboards/robots.yaml
      title: Robots
      icon: mdi:robot-vacuum
      show_in_sidebar: true

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

smartir:
  check_updates: false

climate:
  - platform: smartir
    name: Kitchen Mini-Split
    unique_id: kitchen_mini_split
    device_code: 1284
    controller_data: remote.kitchen_universal_remote

  - platform: smartir
    name: Bedroom Mini-Split
    unique_id: bedroom_mini_split
    device_code: 1284
    controller_data: remote.bedroom_universal_remote
