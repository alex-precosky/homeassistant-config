---
name: yamllint

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: apt-get update && apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .
