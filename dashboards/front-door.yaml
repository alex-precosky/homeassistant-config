views:
  - title: Front Door
    sections:
      - type: grid
        cards:
          - type: picture-entity
            camera_view: auto
            camera_image: camera.chez_salex_doorbell_fluent
            entity: camera.chez_salex_doorbell_fluent
            show_entity_picture: true
            card_mod:
              style: |
                hui-image{
                  transform: rotate(90deg);
                }
          - show_name: true
            show_icon: true
            type: button
            entity: lock.front_door
          - type: entity
            entity: binary_sensor.front_door_door
          - type: thermostat
            entity: climate.smart_thermostat_25101135275820601202c4e7ae224d17
          - type: custom:scheduler-card
            domains:
              - climate
            title: Scheduler

      - type: grid
        cards:
          - show_current: true
            show_forecast: true
            type: weather-forecast
            entity: weather.forecast_home
            forecast_type: hourly
          - !include cards/bus_schedule.yaml
          - graph: line
            type: sensor
            entity: sensor.alex_bot_battery
            detail: 1
            grid_options:
              columns: 12
              rows: 2
          - type: entity
            entity: vacuum.alex_bot
            grid_options:
              columns: 12
              rows: 2
      - type: grid
        cards:
          - type: light
            entity: light.hubby_office
          - type: light
            entity: light.entryway
