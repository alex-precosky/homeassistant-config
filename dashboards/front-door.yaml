views:
  - title: Front Door
    sections:
      - type: grid
        cards:
          - type: 'custom:alarmo-card'
            entity: alarm_control_panel.alarmo
          - type: picture-entity
            entity: camera.chez_salex_doorbell_fluent
          - show_name: true
            show_icon: true
            type: button
            entity: lock.front_door
          - type: entity
            entity: binary_sensor.front_door_door

      - type: grid
        cards:
          - show_current: true
            show_forecast: true
            type: weather-forecast
            entity: weather.forecast_home
            forecast_type: hourly
          - !include cards/bus_schedule.yaml
          - type: picture-entity
            entity: camera.backyard_fluent
      - type: grid
        cards:
          - type: light
            entity: light.hubby_office
            grid_options:
              columns: 4
              rows: 3
          - type: light
            entity: light.entryway
            grid_options:
              columns: 4
              rows: 3
          - type: light
            entity: light.porch
            grid_options:
              columns: 4
              rows: 3
          - type: thermostat
            entity: climate.smart_thermostat_25101135275820601202c4e7ae224d17