---
type: markdown
content: |
  {% macro mins(departures, index) -%}
    {% if departures and departures|length > index -%}
      {{ ((as_timestamp((departures[index]['departure_realtime_datetime'])) - as_timestamp(now())) / 60) | int }}
    {%- else -%}
      -1
    {%- endif %}
  {%- endmacro -%}

  {% macro cell(departures, index) -%}
    {% set m = mins(departures, index) | int %}
    {% if m < 0 -%}
      <span style="color:var(--secondary-text-color);">—</span>
    {%- elif m < 5 -%}
      <span style="color:#e74c3c;font-weight:600;">{{ m }} min</span>
    {%- elif m < 15 -%}
      <span style="color:#f39c12;font-weight:600;">{{ m }} min</span>
    {%- else -%}
      <span style="color:#27ae60;font-weight:600;">{{ m }} min</span>
    {%- endif %}
  {%- endmacro -%}

  <table style="width:100%;border-collapse:collapse;font-size:0.95em;">
    <thead>
      <tr style="border-bottom:2px solid var(--divider-color);">
        <th style="text-align:left;padding:8px 6px;">Route</th>
        <th style="text-align:right;padding:8px 6px;">Next</th>
        <th style="text-align:right;padding:8px 6px;">Following</th>
      </tr>
    </thead>
    <tbody>
      <tr style="border-bottom:1px solid var(--divider-color);">
        <td style="padding:10px 6px;">🚌 <b>#40</b> Downtown</td>
        {%- set d = state_attr('sensor.gtfs_bus_40_to_downtown_19320_local_stop_zone_home', 'next_departures_lines') %}
        <td style="text-align:right;padding:10px 6px;">{{ cell(d, 0) }}</td>
        <td style="text-align:right;padding:10px 6px;">{{ cell(d, 1) }}</td>
      </tr>
      <tr>
        <td style="padding:10px 6px;">🚌 <b>#40</b> Northgate</td>
        {%- set d = state_attr('sensor.gtfs_bus_40_to_downtown_19550_local_stop_zone_home', 'next_departures_lines') %}
        <td style="text-align:right;padding:10px 6px;">{{ cell(d, 0) }}</td>
        <td style="text-align:right;padding:10px 6px;">{{ cell(d, 1) }}</td>
      </tr>
    </tbody>
  </table>
