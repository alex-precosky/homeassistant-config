views:
  - title: Mini Splits
    sections:
      - type: grid
        cards:
          # ── Turn Both Off ────────────────────────────────────────────
          - type: button
            name: Turn Both Off
            icon: mdi:power
            tap_action:
              action: perform-action
              perform_action: climate.turn_off
              target:
                entity_id:
                  - climate.kitchen_mini_split
                  - climate.bedroom_mini_split
            grid_options:
              columns: 12
              rows: 1

          # ── Status cards ─────────────────────────────────────────────
          - type: thermostat
            entity: climate.kitchen_mini_split
            grid_options:
              columns: 6
              rows: 4

          - type: thermostat
            entity: climate.bedroom_mini_split
            grid_options:
              columns: 6
              rows: 4

          # ── Kitchen mode buttons ──────────────────────────────────────
          - type: button
            name: Kitchen On
            icon: mdi:power-on
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_on
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Kitchen Heat
            icon: mdi:fire
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_heat
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Kitchen Cool
            icon: mdi:snowflake
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_cool
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Kitchen Off
            icon: mdi:power
            tap_action:
              action: perform-action
              perform_action: climate.turn_off
              target:
                entity_id: climate.kitchen_mini_split
            grid_options:
              columns: 3
              rows: 1

          # ── Bedroom mode buttons ──────────────────────────────────────
          - type: button
            name: Bedroom On
            icon: mdi:power-on
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_on
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Bedroom Heat
            icon: mdi:fire
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_heat
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Bedroom Cool
            icon: mdi:snowflake
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_cool
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Bedroom Off
            icon: mdi:power
            tap_action:
              action: perform-action
              perform_action: climate.turn_off
              target:
                entity_id: climate.bedroom_mini_split
            grid_options:
              columns: 3
              rows: 1

          # ── Kitchen fan speed buttons ────────────────────────────────
          - type: button
            name: Kitchen Fan Low
            icon: mdi:fan-speed-1
            tap_action:
              action: perform-action
              perform_action: climate.set_fan_mode
              target:
                entity_id: climate.kitchen_mini_split
              data:
                fan_mode: low
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Kitchen Fan Med
            icon: mdi:fan-speed-2
            tap_action:
              action: perform-action
              perform_action: climate.set_fan_mode
              target:
                entity_id: climate.kitchen_mini_split
              data:
                fan_mode: medium
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Kitchen Fan High
            icon: mdi:fan-speed-3
            tap_action:
              action: perform-action
              perform_action: climate.set_fan_mode
              target:
                entity_id: climate.kitchen_mini_split
              data:
                fan_mode: high
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Kitchen Fan Auto
            icon: mdi:fan-auto
            tap_action:
              action: perform-action
              perform_action: climate.set_fan_mode
              target:
                entity_id: climate.kitchen_mini_split
              data:
                fan_mode: auto
            grid_options:
              columns: 3
              rows: 1

          # ── Bedroom fan speed buttons ────────────────────────────────
          - type: button
            name: Bedroom Fan Low
            icon: mdi:fan-speed-1
            tap_action:
              action: perform-action
              perform_action: climate.set_fan_mode
              target:
                entity_id: climate.bedroom_mini_split
              data:
                fan_mode: low
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Bedroom Fan Med
            icon: mdi:fan-speed-2
            tap_action:
              action: perform-action
              perform_action: climate.set_fan_mode
              target:
                entity_id: climate.bedroom_mini_split
              data:
                fan_mode: medium
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Bedroom Fan High
            icon: mdi:fan-speed-3
            tap_action:
              action: perform-action
              perform_action: climate.set_fan_mode
              target:
                entity_id: climate.bedroom_mini_split
              data:
                fan_mode: high
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Bedroom Fan Auto
            icon: mdi:fan-auto
            tap_action:
              action: perform-action
              perform_action: climate.set_fan_mode
              target:
                entity_id: climate.bedroom_mini_split
              data:
                fan_mode: auto
            grid_options:
              columns: 3
              rows: 1

          # ── Temperature buttons ──────────────────────────────────────
          - type: button
            name: Kitchen Temp -
            icon: mdi:thermometer-minus
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_temp_down
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Kitchen Temp +
            icon: mdi:thermometer-plus
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_temp_up
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Bedroom Temp -
            icon: mdi:thermometer-minus
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_temp_down
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Bedroom Temp +
            icon: mdi:thermometer-plus
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_temp_up
            grid_options:
              columns: 3
              rows: 1

      - type: grid
        cards:
          - type: custom:scheduler-card
            discover_existing: false
            tags: mini-split
            title: Mini-Split Schedule
            entities:
              - climate.kitchen_mini_split
              - climate.bedroom_mini_split
              - remote.bedroom_universal_remote