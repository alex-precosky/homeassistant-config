---
views:
  - title: Mini Splits
    sections:
      - type: grid
        cards:
          # ── Turn Both Off ────────────────────────────────────────────
          - type: button
            name: Turn Both Off
            icon: mdi:power
            tap_action:
              action: perform-action
              perform_action: climate.turn_off
              target:
                entity_id:
                  - climate.kitchen_mini_split
                  - climate.bedroom_mini_split
            grid_options:
              columns: 12
              rows: 1

          # ── Status cards ─────────────────────────────────────────────
          - type: thermostat
            entity: climate.kitchen_mini_split
            grid_options:
              columns: 6
              rows: 4

          - type: thermostat
            entity: climate.bedroom_mini_split
            grid_options:
              columns: 6
              rows: 4

          # ── Kitchen ──────────────────────────────────────────────────
          - type: heading
            heading: Kitchen

            icon: mdi:silverware-fork-knife
            grid_options:
              columns: 12
              rows: 1

          - type: button
            name: "On"
            icon: mdi:power-on
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_on
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Heat
            icon: mdi:fire
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_heat
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Cool
            icon: mdi:snowflake
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_cool
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: "Off"
            icon: mdi:power
            tap_action:
              action: perform-action
              perform_action: climate.turn_off
              target:
                entity_id: climate.kitchen_mini_split
            grid_options:
              columns: 3
              rows: 1

          - type: tile
            entity: climate.kitchen_mini_split
            name: Fan Speed
            features:
              - type: climate-fan-modes
                fan_modes:
                  - low
                  - medium
                  - high
                  - auto
                style: dropdown
            grid_options:
              columns: 12
              rows: 2

          - type: button
            name: Temp -
            icon: mdi:thermometer-minus
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_temp_down
            grid_options:
              columns: 6
              rows: 1

          - type: button
            name: Temp +
            icon: mdi:thermometer-plus
            tap_action:
              action: perform-action
              perform_action: script.kitchen_mini_split_temp_up
            grid_options:
              columns: 6
              rows: 1

          # ── Bedroom ──────────────────────────────────────────────────
          - type: heading
            heading: Bedroom

            icon: mdi:bed
            grid_options:
              columns: 12
              rows: 1

          - type: button
            name: "On"
            icon: mdi:power-on
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_on
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Heat
            icon: mdi:fire
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_heat
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: Cool
            icon: mdi:snowflake
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_cool
            grid_options:
              columns: 3
              rows: 1

          - type: button
            name: "Off"
            icon: mdi:power
            tap_action:
              action: perform-action
              perform_action: climate.turn_off
              target:
                entity_id: climate.bedroom_mini_split
            grid_options:
              columns: 3
              rows: 1

          - type: tile
            entity: climate.bedroom_mini_split
            name: Fan Speed
            features:
              - type: climate-fan-modes
                fan_modes:
                  - low
                  - medium
                  - high
                  - auto
                style: dropdown
            grid_options:
              columns: 12
              rows: 2

          - type: button
            name: Temp -
            icon: mdi:thermometer-minus
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_temp_down
            grid_options:
              columns: 6
              rows: 1

          - type: button
            name: Temp +
            icon: mdi:thermometer-plus
            tap_action:
              action: perform-action
              perform_action: script.bedroom_mini_split_temp_up
            grid_options:
              columns: 6
              rows: 1

      - type: grid
        cards:
          - type: custom:scheduler-card
            discover_existing: false
            tags: mini-split
            title: Mini-Split Schedule
            entities:
              - climate.kitchen_mini_split
              - climate.bedroom_mini_split
              - remote.bedroom_universal_remote
